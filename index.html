<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BibTeX to HTML List</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">ADADA Publications</p>
        <h1>BibTeX to HTML List</h1>
      </div>
      <a class="quiet-link" href="README.md">README</a>
    </header>

    <section class="tool-grid" aria-label="BibTeX HTML変換ツール">
      <div class="input-panel">
        <div class="field-block">
          <label for="directoryInput">BibTeXフォルダを選択</label>
          <input id="directoryInput" type="file" accept=".bib" webkitdirectory multiple>
        </div>

        <div class="field-block">
          <label for="fileInput">または .bib ファイルを複数選択</label>
          <input id="fileInput" type="file" accept=".bib" multiple>
        </div>

        <div class="field-block">
          <label for="pasteInput">または BibTeXを貼り付け</label>
          <textarea id="pasteInput" rows="11" spellcheck="false" placeholder="@article{...}"></textarea>
        </div>

        <div class="actions">
          <button id="convertButton" type="button">変換</button>
          <button id="clearButton" class="secondary" type="button">クリア</button>
        </div>

        <p id="status" class="status" role="status">.bibファイル、フォルダ、または貼り付けテキストを選んでください。</p>
      </div>

      <div class="output-panel">
        <div class="output-toolbar" aria-label="出力操作">
          <div>
            <p class="eyebrow">Output</p>
            <h2>HTML</h2>
          </div>
          <div class="toolbar-actions">
            <button id="copyButton" class="secondary" type="button" disabled>コピー</button>
            <button id="downloadButton" class="secondary" type="button" disabled>HTML保存</button>
          </div>
        </div>
        <textarea id="htmlOutput" class="code-output" rows="18" spellcheck="false" readonly></textarea>

        <div class="preview-wrap">
          <p class="eyebrow">Preview</p>
          <div id="preview" class="preview" aria-live="polite"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
